<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* background-color: #f5f5f5; 浅色背景 */
            background-color: #FFF; /* 浅色背景 */
            color: #333; /* 深色文字 */

            font-family: Arial, sans-serif;
        }
        .loading {
            text-align: center;
        }
        .loading img {
            width: 100px; /* 图标宽度 */
            height: 100px; /* 图标高度 */
            margin-bottom: 20px;
        }
        .loading .spinner {
            width: 40px; /* 圆环大小 */
            height: 40px;
            border: 4px solid transparent; /* 内外边框透明 */
            border-top: 4px solid #18193F; /* 顶部边框颜色 */
            border-radius: 50%; /* 圆形 */
            animation: spin 1s linear infinite; /* 旋转动画 */
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <!-- 图标 -->
        <img src="../../images/chatgpt.ico" alt="ChatGPT Icon">
        <!-- 小圆环 -->
        <div class="spinner"></div>
    </div>
</body>
</html>
